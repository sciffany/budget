name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: src/main/parsers/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/main/parsers/requirements.txt
          pip install pyinstaller

      - name: Build Python parsers into standalone exes
        shell: bash
        run: |
          mkdir -p build/python-bin
          for script in src/main/parsers/*.py; do
            name=$(basename "$script" .py)
            echo "Building $name.exe from $script"
            pyinstaller \
              --onefile \
              --name "$name" \
              --distpath build/python-bin \
              --workpath build/pyinstaller-work \
              --specpath build/pyinstaller-spec \
              "$script"
          done
          ls build/python-bin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build and package Electron app
        run: npm run package -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error
